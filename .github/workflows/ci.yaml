terraform-checks:
    runs-on: ubuntu-latest
    needs: Initial-Checks
    outputs:
      status: ${{ job.status }}

    # --------------------------------------------------------------------------
    # FIX: Change "./terraform" to match the exact name of your infra folder!
    # If your files are in the main root directory, use "."
    # --------------------------------------------------------------------------
    defaults:
      run:
        working-directory: ./M3-6

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false # Bypasses wrapper abstractions to ensure strict local directory pathing

    - name: Terraform Init (Validation Mode)
      id: init
      run: terraform init -backend=false -upgrade

    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - uses: terraform-linters/setup-tflint@v3
      with:
        tflint_version: latest
    
    - name: Show version
      run: tflint --version

    - name: Init TFLint
      run: tflint --init

    - name: Run TFLint
      run: tflint -f compact
      
    ########################################
    # Add a job for snyk scan of your code #
   ########################################
snyk-checks:
    runs-on: ubuntu-latest
    needs: Initial-Checks
    outputs:
      status: ${{ job.status }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Snyk CLI
      uses: snyk/actions/setup@master

    # 1. Snyk Code Test (Static Application Security Testing / SAST)
    - name: Snyk Code Test
      run: snyk code test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 2. Snyk Test (Open Source Software Vulnerabilities & License Compliance)
    - name: Snyk Open Source Test
      run: snyk test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 3. Snyk IaC Test (Infrastructure as Code security compliance for Terraform)
    - name: Snyk IaC Test
      run: snyk iac test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 4. Build Docker Image
    - name: Build Docker Image
      run: docker build -t "snyk-image" . # FIX: Added dot to resolve workspace root context
          
    # 5. Snyk Container Test (Scans image layers for OS level vulnerabilities)
    - name: Snyk Container Test
      run: snyk container test "snyk-image"
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    #################################################
    # Finally, update summary for snyk-check        #
    # Update needs statement to include snyk-checks #
    #################################################
  summary:
    needs: [terraform-checks, snyk-checks]
    runs-on: ubuntu-latest
    if: always() # Forces execution even if upstream validation checks fail
    steps:
      - name: Adding markdown
        run: |
          # Use GitHub Actions environment variables to safely read step outcomes without breaking compilation maps
          TF_STATUS="${{ needs.terraform-checks.result }}"
          SNYK_STATUS="${{ needs.snyk-checks.result }}"

          echo '## 🚀 Preparing Build Summary 🚀' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          echo "| Job Name        | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tf-check        | $TF_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| snyk-check      | $SNYK_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          echo '## Job ran by: ${{ github.actor }}' >> $GITHUB_STEP_SUMMARY
