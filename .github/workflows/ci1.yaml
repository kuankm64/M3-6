name: CI Checks
run-name: Running Terraform Checks by ${{ github.actor }}
# This workflow is triggered on pull requests to the main branch and performs the following checks: 
on:
 pull_request:
   branches:
     - main

jobs:
  Initial-Checks:
    runs-on: ubuntu-latest

    steps:
    - name: Getting initiator name
      run: echo "Workflow initiated by ${{ github.actor }} from branch ${{ github.ref_name }}"

  terraform-checks:
    runs-on: ubuntu-latest
    needs: Initial-Checks
    outputs:
      status: ${{ job.status }}
    
    defaults:
      run:
        working-directory: .

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # Upgrade to v3 for Node20 runtime compatibility and speed improvements
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false 

    # FIX: Creates a persistent cache for your provider binaries (aws 5.100.0, archive 2.8.0)
    - name: Cache Terraform Providers
      uses: actions/cache@v3
      with:
        path: |
          ~/.terraform.d/plugin-cache
        key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          ${{ runner.os }}-terraform-

    # FIX: Registers the plugin cache directory globally in the runner environment
    - name: Configure Terraform Plugin Cache
      run: |
        mkdir -p ~/.terraform.d/plugin-cache
        echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraform.rc

    - name: Terraform Init (Validation Mode)
      id: init
      run: terraform init -upgrade

    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - uses: terraform-linters/setup-tflint@v3
      with:
        tflint_version: latest
    
    - name: Show version
      run: tflint --version

    - name: Init TFLint
      run: tflint --init

    - name: Run TFLint
      run: tflint -f compact

  snyk-checks:
    runs-on: ubuntu-latest
    needs: Initial-Checks
    outputs:
      status: ${{ job.status }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Snyk CLI
      uses: snyk/actions/setup@master

    # 1. Snyk Code Test (Static Application Security Testing / SAST)
    - name: Snyk Code Test
      run: snyk code test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 2. Snyk Test (Open Source Software Vulnerabilities & License Compliance)
    - name: Snyk Open Source Test
      run: snyk test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 3. Snyk IaC Test (Infrastructure as Code security compliance for Terraform)
    - name: Snyk IaC Test
      run: snyk iac test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # 4. Build Docker Image (Will only run if a Dockerfile exists in root)
    - name: Build Docker Image
      run: |
        if [ -f Dockerfile ]; then
          docker build -t "snyk-image" .
        else
          echo "No Dockerfile found, skipping Docker build step."
        fi
          
    # 5. Snyk Container Test (Scans image layers for OS level vulnerabilities)
    - name: Snyk Container Test
      run: |
        if [ -f Dockerfile ]; then
          snyk container test "snyk-image"
        else
          echo "No Dockerfile found, skipping Container scan."
        fi
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  summary:
    needs: [terraform-checks, snyk-checks]
    runs-on: ubuntu-latest
    if: always() # Forces execution even if compilation maps or upstream checks fail
    steps:
      - name: Adding markdown
        run: |
          # Safe environment mapping from the GitHub engine framework
          TF_STATUS="${{ needs.terraform-checks.result }}"
          SNYK_STATUS="${{ needs.snyk-checks.result }}"

          echo '## 🚀 Preparing Build Summary 🚀' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          echo "| Job Name        | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tf-check        | $TF_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| snyk-check      | $SNYK_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY

          echo '## Job ran by: ${{ github.actor }}' >> $GITHUB_STEP_SUMMARY